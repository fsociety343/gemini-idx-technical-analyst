name: Daily Stock Analysis Report

on:
  schedule:
    # Menjalankan setiap hari Senin-Jumat pada jam 01:00 UTC (Setara 08:00 WIB)
    - cron: '0 1 * * 1-5'
  workflow_dispatch: # Memungkinkan Anda menjalankan script secara manual via tombol di GitHub

jobs:
  analyze_and_report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Mempercepat proses build dengan melakukan caching pada library

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Execute Analysis Script
      env:
        # Mengambil kredensial dari GitHub Secrets yang sudah Anda daftarkan
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python bot_saham.py